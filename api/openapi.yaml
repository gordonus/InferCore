openapi: 3.0.3
info:
  title: InferCore API
  version: 0.1.0
  description: >
    InferCore HTTP API (OpenAPI draft). POST /infer is the single ingress for plain inference,
    RAG (retrieval + rerank + model call when request_type=rag), and agent-ingress preview (no agent runtime).
servers:
  - url: http://localhost:8080
paths:
  /infer:
    post:
      summary: Run an AI request through InferCore (inference, RAG, or agent preview)
      description: >
        Unified AI ingress. Use request_type=inference (default), rag (requires knowledge_bases in server config),
        or agent (ingress only: returns 501 agent_not_implemented; no tool loop). RAG requests run retrieve and rerank after routing, then call the selected backend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIRequest'
      responses:
        '200':
          description: Successful AI response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIResponse'
        '400':
          description: Invalid request (including misconfigured RAG / empty query when request_type=rag)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Policy rejected request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: >
            Agent request accepted on the wire but no agent runtime is shipped yet (agent_not_implemented).
            Not a full agent platform—only an agent-ready request model and policy hooks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Backend execution failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Exceeded server.request_timeout_ms (policy + routing + optional RAG + backends)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      summary: Get service health
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /status:
    get:
      summary: Get backend and queue status summary
      responses:
        '200':
          description: Runtime status summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  backends:
                    type: array
                    items:
                      type: object
                  queue_depth:
                    type: integer
  /metrics:
    get:
      summary: Get Prometheus metrics
      responses:
        '200':
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    RequestOptions:
      type: object
      properties:
        stream:
          type: boolean
        max_tokens:
          type: integer
          minimum: 1
      required:
        - stream
        - max_tokens
    AIRequest:
      type: object
      description: >
        Unified ingress body for inference, RAG, and agent (preview). Optional request_type,
        pipeline_ref, and context. Defaults request_type=inference, pipeline_ref=inference/basic:v1.
        For RAG, set request_type=rag, provide input.text and/or context.query, and context.knowledge_base
        to select a configured knowledge base.
      properties:
        request_id:
          type: string
          description: Optional; server assigns UUID if omitted.
        request_type:
          type: string
          enum: [inference, rag, agent]
          description: inference (default), rag, or agent (agent returns 501 until a runtime exists)
        pipeline_ref:
          type: string
          example: inference/basic:v1
        context:
          type: object
          additionalProperties: true
          description: RAG query overrides (e.g. query, knowledge_base), agent tool hints, etc.
        tenant_id:
          type: string
        task_type:
          type: string
        priority:
          type: string
        input:
          type: object
          additionalProperties: true
        options:
          $ref: '#/components/schemas/RequestOptions'
      required:
        - tenant_id
        - task_type
        - input
        - options
    AIMetrics:
      type: object
      properties:
        ttft_ms:
          type: integer
          format: int64
        tpot_ms:
          type: integer
          format: int64
        completion_latency_ms:
          type: integer
          format: int64
        estimated_cost:
          type: number
          format: float
      required:
        - ttft_ms
        - tpot_ms
        - completion_latency_ms
        - estimated_cost
    FallbackState:
      type: object
      properties:
        triggered:
          type: boolean
      required:
        - triggered
    DegradeState:
      type: object
      properties:
        triggered:
          type: boolean
        reason:
          type: string
      required:
        - triggered
    AIResponse:
      type: object
      properties:
        request_id:
          type: string
        trace_id:
          type: string
        request_type:
          type: string
        pipeline_ref:
          type: string
        selected_backend:
          type: string
        route_reason:
          type: string
        policy_reason:
          type: string
        effective_priority:
          type: string
        status:
          type: string
        result:
          type: object
          additionalProperties: true
        metrics:
          $ref: '#/components/schemas/AIMetrics'
        fallback:
          $ref: '#/components/schemas/FallbackState'
        degrade:
          $ref: '#/components/schemas/DegradeState'
      required:
        - request_id
        - selected_backend
        - route_reason
        - status
        - result
        - metrics
        - fallback
        - degrade
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          enum:
            - method_not_allowed
            - invalid_request
            - invalid_options
            - unsupported_request_type
            - policy_error
            - policy_rejected
            - route_error
            - execution_failed
            - agent_not_implemented
            - rag_not_configured
        message:
          type: string
      required:
        - code
        - message
    ErrorResponse:
      type: object
      properties:
        request_id:
          type: string
        status:
          type: string
          example: error
        error:
          $ref: '#/components/schemas/ErrorDetail'
      required:
        - request_id
        - status
        - error
